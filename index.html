
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure CMS</title>
<link rel="shortcut icon" type="image/x-icon" href="marvz-ico.ico">
<style>

        #passwordOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg/img/fenrir.png');
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }


        #passwordOverlay input {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }

        #passwordOverlay button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
        }

        #passwordOverlay button:hover {
            background-color: #0056b3;
        }
.container{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
    align-items:center;
    text-align:center;
}
.selection {
    flex: 1;
    display: flex;
    justify-content: space-between;
    flex-direction: column;
    align-items: center;
    width: 100%;
    text-align: center;
}
.frame-left {
          margin-left: -260px;
          width: 99%;
}
.button.active {
    font-family: "Varela round", sans-serif;
    background-color: #ffffff;
    color: #0C4D8E;
    border-radius: 0px 40px 40px 0px;
    border: 0px solid #ccc;
    width:243px;
    height: 45px;
    padding-left: 37px;
    font-weight: bold;
    text-align: left;
    cursor: pointer;
}

.button:hover {
    background-color: #E9F3FB;
    transition: background-color 100ms linear;
    cursor: pointer;
}

button:disabled {
    cursor: not-allowed;
    opacity: 0.5;
}
.styled-button {
  position: relative;
  padding: 1rem 2rem;
  font-size: 1.1rem;
  font-weight: bold;
  color: #ffffff;
  background: #ffffff;
  border-radius: 9999px;
  cursor: pointer;
  box-shadow: 0 2px 4px rgba(0, 0, 0, 1), 0 10px 20px rgba(0, 0, 0, 0.4);
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #292929;
}



</style>
</head>
<body>
  <iframe src="assets/plugins/waves.html" 
          style="position: absolute; top: 0px; left: 0; width: 100vw; height: 100vh; z-index: 0; border: none;overflow:hidden;">
  </iframe>
    <div id="passwordOverlay">
<img src="assets\img\azure.png" style="height: 90px;">
<input type="password" id="passwordInput" placeholder="Enter password" oninput="checkPassword()" />

        <p id="error" style="color: red; display: none;">Incorrect password. Try again.</p>
<span>
<div class="container">
<div class="selection">
<button id="accBtn" onclick="goToACC()" class="styled-button" disabled>
<img src="assets\img\icons\acc.png" style="width:auto;height:30px;">
</button>
</div>

<div class="selection">
<button id="engBtn" onclick="goToENG()" class="styled-button" disabled>
<img src="assets\img\icons\eng.png" style="width:auto;height:30px;">
</button>
</div>

<div class="selection">
<button id="ghkBtn" onclick="goToGHK()" class="styled-button" disabled>
<img src="assets\img\icons\ghk.png" style="width:auto;height:30px;">
</button>

</div>
<div class="selection">
<button id="pmoBtn" onclick="goToPMO()" class="styled-button" disabled>
<img src="assets\img\icons\pmo.png" style="width:auto;height:30px;">
</button>
</div>

<div class="selection">
<button id="rrdBtn" onclick="goToRRD()" class="styled-button" disabled>
<img src="assets\img\icons\rrd.png" style="width:auto;height:30px;">
</button>
</div>

<div class="selection">
<button id="secBtn" onclick="goToSEC()" class="styled-button" disabled>
<img src="assets\img\icons\sec.png" style="width:auto;height:30px;">
</button>
</div>
<div class="selection">
<button id="mgrBtn" onclick="goToMGR()" class="styled-button" disabled>
<img src="assets\img\icons\mgr.png" style="width:auto;height:30px;">
</button>
</div>
</div>

   <script src="assets\js\index.js"></script>
<script>
const passwords = {
    mgrBtn: "mgr123",
    accBtn: "acc123",
    engBtn: "eng123",
    ghkBtn: "ghk123",
    pmoBtn: "pmo123",
    rrdBtn: "rrd123",
    secBtn: "sec123"
};

function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    const error = document.getElementById('error');

    let matched = false;

    Object.keys(passwords).forEach(id => {
        const btn = document.getElementById(id);
        if (!btn) return;

        if (input === passwords[id]) {
            btn.disabled = false;
            matched = true;
        } else {
            btn.disabled = true;
        }
    });

    error.style.display = matched ? "none" : "block";
}

window.addEventListener("DOMContentLoaded", () => {
    const savedPage = localStorage.getItem("lastPage");

    if (savedPage) {
        window.location.href = savedPage;
    }
});
</script>
</body>
</html>
